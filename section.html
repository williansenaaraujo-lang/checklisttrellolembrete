<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        body { font-family: sans-serif; color: #b6c2cf; background-color: #282e33; margin: 0; padding: 0; }
        .container { background-color: #22272b; border-radius: 5px; padding: 10px; }
        .linha { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #353c42; font-size: 13px; }
        .atrasado { color: #f87168; font-weight: bold; }
        .hoje { color: #f5cd47; font-weight: bold; }
        .futuro { color: #579dff; }
        .resp { color: #9fadbc; font-size: 11px; }
    </style>
</head>
<body>
    <div id="lista" class="container">Procurando dados...</div>
    <script>
        var t = TrelloPowerUp.iframe();
        var lastPing = 0;

        t.render(function() {
            Promise.all([ t.card('checklists'), t.getAll() ]).then(function(res) {
                var checklists = res[0].checklists || [];
                var all = res[1] || {};
                var shared = (all.card && all.card.shared) ? all.card.shared : {};
                var dbNew = shared.dbLembretes || {};

                // ⚡ O DESFIBRILADOR (Se o Trello mandar fantasma, dá o choque)
                var hasLists = checklists.length > 0;
                var hasItems = false;
                checklists.forEach(function(l) { if (l.checkItems && l.checkItems.length > 0) hasItems = true; });

                if (hasLists && !hasItems) {
                    if (Date.now() - lastPing > 3000) {
                        lastPing = Date.now();
                        t.set('card', 'shared', 'ping WakeUp', Date.now()); 
                        return; 
                    }
                }

                var final = [];
                var hoje = new Date().toISOString().split('T')[0];

                checklists.forEach(function(l) {
                    (l.checkItems || []).forEach(function(i) {
                        if (i.state !== 'complete') {
                            // Puxa as datas antigas ou novas
                            var d = dbNew['data-' + i.id] || shared['data-' + i.id];
                            var r = dbNew['resp-' + i.id] || shared['resp-' + i.id];
                            if (d) final.push({ n: i.name, d: d, r: r });
                        }
                    });
                });

                if (final.length > 0) {
                    final.sort(function(a,b) { return a.d.localeCompare(b.d); });
                    var html = '';
                    final.forEach(function(it) {
                        var cls = (it.d < hoje) ? 'atrasado' : (it.d === hoje ? 'hoje' : 'futuro');
                        var resp = it.r ? '@' + it.r : '';
                        html += `<div class="linha">
                            <span style="width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${it.n}</span>
                            <span class="resp">${resp}</span>
                            <span class="${cls}">${it.d.split('-').reverse().join('/')}</span>
                        </div>`;
                    });
                    document.getElementById('lista').innerHTML = html;
                } else {
                    document.getElementById('lista').innerHTML = '<p style="text-align:center;font-size:12px;color:#9fadbc;margin:0;">Nenhum lembrete para este cartão.</p>';
                }
                t.sizeTo('body');
            });
        });
    </script>
</body>
</html>
