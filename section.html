<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #282e33; color: #b6c2cf; margin: 0; padding: 0; }
        .container { background-color: #22272b; border-radius: 5px; padding: 10px; }
        .linha { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #353c42; font-size: 13px; }
        .linha:last-child { border-bottom: none; }
        .atrasado { color: #f87168; font-weight: bold; }
        .hoje { color: #f5cd47; font-weight: bold; }
        .futuro { color: #579dff; }
        .resp { color: #9fadbc; font-size: 11px; }
    </style>
</head>
<body>
    <div id="lista" class="container">Procurando datas...</div>
    <script>
        var t = TrelloPowerUp.iframe();
        var bancoDeDados = {};

        function desenharPainel() {
            t.card('checklists').then(function(cardInfo) {
                var checklists = cardInfo.checklists || [];
                
                var temItens = false;
                checklists.forEach(function(c) {
                    if (c.checkItems && c.checkItems.length > 0) temItens = true;
                });

                // 🔄 O LOOP DA PACIÊNCIA também no painel
                if (checklists.length > 0 && !temItens) {
                    document.getElementById('lista').innerHTML = '<p style="text-align:center;font-size:12px;color:#f5cd47;margin:0;">Aguardando Trello baixar as tarefas...</p>';
                    setTimeout(desenharPainel, 1000);
                    return;
                }

                var dbNew = bancoDeDados.dbLembretes || {};
                var final = [];
                var hoje = new Date().toISOString().split('T')[0];

                checklists.forEach(function(l) {
                    (l.checkItems || []).forEach(function(i) {
                        if (i.state !== 'complete') {
                            var d = dbNew['data-' + i.id] || bancoDeDados['data-' + i.id];
                            var r = dbNew['resp-' + i.id] || bancoDeDados['resp-' + i.id];
                            if (d) final.push({ n: i.name, d: d, r: r });
                        }
                    });
                });

                if (final.length > 0) {
                    final.sort(function(a,b) { return a.d.localeCompare(b.d); });
                    var html = '';
                    final.forEach(function(it) {
                        var cls = (it.d < hoje) ? 'atrasado' : (it.d === hoje ? 'hoje' : 'futuro');
                        var resp = it.r ? '@' + it.r : '';
                        html += `<div class="linha">
                            <span style="width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${it.n}</span>
                            <span class="resp">${resp}</span>
                            <span class="${cls}">${it.d.split('-').reverse().join('/')}</span>
                        </div>`;
                    });
                    document.getElementById('lista').innerHTML = html;
                } else {
                    document.getElementById('lista').innerHTML = '<p style="text-align:center;font-size:12px;color:#9fadbc;margin:0;">Nenhum lembrete para este cartão.</p>';
                }
                t.sizeTo('body');
            });
        }

        t.render(function() {
            t.get('card', 'shared').then(function(shared) {
                bancoDeDados = shared || {};
                desenharPainel();
            });
        });
    </script>
</body>
</html>
