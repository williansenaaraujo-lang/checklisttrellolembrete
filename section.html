<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #282e33; color: #b6c2cf; margin: 0; padding: 0; }
        .container { background-color: #22272b; border-radius: 5px; padding: 10px; }
        .linha { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #353c42; font-size: 13px; }
        .linha:last-child { border-bottom: none; }
        .atrasado { color: #f87168; font-weight: bold; }
        .hoje { color: #f5cd47; font-weight: bold; }
        .futuro { color: #579dff; }
        .resp { color: #9fadbc; font-size: 11px; }
    </style>
</head>
<body>
    <div id="lista" class="container">Carregando painel...</div>

    <script>
        var t = TrelloPowerUp.iframe();
        var htmlMemoria = ''; 

        function desenharPainel() {
            Promise.all([ t.card('checklists'), t.get('card', 'shared', 'dbLembretes') ]).then(function(res) {
                var checklists = res[0].checklists || [];
                var db = res[1] || {};
                var itensParaMostrar = {};

                // 1. MEMÓRIA FOTOGRÁFICA: Carrega tudo que está salvo instantaneamente
                for (var key in db) {
                    if (key.startsWith('data-')) {
                        var id = key.replace('data-', '');
                        itensParaMostrar[id] = {
                            id: id,
                            d: db['data-' + id],
                            r: db['resp-' + id] || '',
                            n: db['nome-' + id] || 'Tarefa Agendada' // Usa o nome salvo!
                        };
                    }
                }

                // 2. ATUALIZAÇÃO: Se o Trello já carregou os checklists, esconde o que foi concluído
                checklists.forEach(function(lista) {
                    (lista.checkItems || []).forEach(function(item) {
                        if (itensParaMostrar[item.id]) {
                            itensParaMostrar[item.id].n = item.name; // Pega o nome mais atual se tiver
                            if (item.state === 'complete') {
                                delete itensParaMostrar[item.id]; // Remove da tela
                            }
                        }
                    });
                });

                var final = Object.values(itensParaMostrar);
                var hoje = new Date().toISOString().split('T')[0];
                var html = '';

                if (final.length > 0) {
                    final.sort(function(a,b) { return a.d.localeCompare(b.d); });
                    final.forEach(function(it) {
                        var cls = (it.d < hoje) ? 'atrasado' : (it.d === hoje ? 'hoje' : 'futuro');
                        var resp = it.r ? '@' + it.r : '';
                        html += `<div class="linha">
                            <span style="width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${it.n}</span>
                            <span class="resp">${resp}</span>
                            <span class="${cls}">${it.d.split('-').reverse().join('/')}</span>
                        </div>`;
                    });
                } else {
                    html = '<p style="text-align:center;font-size:12px;color:#9fadbc;margin:0;">Nenhum lembrete para este cartão.</p>';
                }

                if (html !== htmlMemoria) {
                    document.getElementById('lista').innerHTML = html;
                    htmlMemoria = html;
                    t.sizeTo('body');
                }
            });
        }

        t.render(function() { desenharPainel(); });
        setInterval(desenharPainel, 2000); // Patrulha silenciosa e inofensiva
    </script>
</body>
</html>
