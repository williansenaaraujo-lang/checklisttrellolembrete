<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #282e33; color: #b6c2cf; margin: 0; padding: 0; }
        .container { background-color: #22272b; border-radius: 5px; padding: 10px; }
        .linha { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #353c42; font-size: 13px; }
        .linha:last-child { border-bottom: none; }
        .atrasado { color: #f87168; font-weight: bold; }
        .hoje { color: #f5cd47; font-weight: bold; }
        .futuro { color: #579dff; }
        .resp { color: #9fadbc; font-size: 11px; }
    </style>
</head>
<body>
    <div id="lista" class="container">Carregando painel...</div>

    <script>
        var t = TrelloPowerUp.iframe();
        var htmlMemoria = ''; 

        function desenharPainel() {
            Promise.all([ t.card('checklists'), t.get('card', 'shared') ]).then(function(res) {
                var checklists = res[0].checklists || [];
                var shared = res[1] || {};

                // Junta o banco velho com o novo igual fizemos no popup
                var memoria = {};
                for (var k in shared) {
                    if (k.startsWith('data-')) {
                        var id = k.replace('data-', '');
                        if (!memoria[id]) memoria[id] = { id: id, nome: 'Tarefa Antiga', data: '', resp: '' };
                        memoria[id].data = shared[k];
                        memoria[id].resp = shared['resp-' + id] || '';
                    }
                }
                var dbNew = shared.dbLembretes || {};
                for (var k in dbNew) {
                    if (k.startsWith('data-')) {
                        var id = k.replace('data-', '');
                        if (!memoria[id]) memoria[id] = { id: id, nome: 'Tarefa Agendada', data: '', resp: '' };
                        memoria[id].data = dbNew[k];
                        memoria[id].nome = dbNew['nome-' + id] || memoria[id].nome;
                        memoria[id].resp = dbNew['resp-' + id] || memoria[id].resp;
                    }
                }

                // Tenta pescar nomes reais do Trello ou remover concluídos
                checklists.forEach(function(lista) {
                    if (lista.checkItems) {
                        lista.checkItems.forEach(function(item) {
                            if (memoria[item.id]) {
                                memoria[item.id].nome = item.name;
                                if (item.state === 'complete') delete memoria[item.id]; 
                            }
                        });
                    }
                });

                var final = Object.values(memoria);
                var hoje = new Date().toISOString().split('T')[0];
                var html = '';

                if (final.length > 0) {
                    final.sort(function(a,b) { return a.data.localeCompare(b.data); });
                    final.forEach(function(it) {
                        var cls = (it.data < hoje) ? 'atrasado' : (it.data === hoje ? 'hoje' : 'futuro');
                        var resp = it.resp ? '@' + it.resp : '';
                        html += `<div class="linha">
                            <span style="width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${it.nome}</span>
                            <span class="resp">${resp}</span>
                            <span class="${cls}">${it.data.split('-').reverse().join('/')}</span>
                        </div>`;
                    });
                } else {
                    html = '<p style="text-align:center;font-size:12px;color:#9fadbc;margin:0;">Nenhum lembrete pendente.</p>';
                }

                if (html !== htmlMemoria) {
                    document.getElementById('lista').innerHTML = html;
                    htmlMemoria = html;
                    t.sizeTo('body');
                }
            });
        }

        t.render(function() { desenharPainel(); });
        setInterval(desenharPainel, 1500); 
    </script>
</body>
</html>
