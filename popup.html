<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
      body { padding: 15px; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
      .item-box { background: #f4f5f7; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #dfe1e6; }
      h5 { margin-top: 0; color: #172b4d; }
    </style>
  </head>
  <body>
    <h4>📅 Datas do Checklist</h4>
    <div id="conteudo">Carregando seus itens...</div>

    <script>
      var t = TrelloPowerUp.iframe();

      t.render(function() {
        t.card('checklists').then(function(card) {
          var html = '';

          // Se não tem checklist nenhum
          if (!card.checklists || card.checklists.length === 0) {
            document.getElementById('conteudo').innerHTML = '<p>Crie um checklist primeiro!</p>';
            return;
          }

          // Se tem, vamos varrer e desenhar o calendário
          card.checklists.forEach(function(lista) {
            html += `<h5>📋 ${lista.name}</h5>`;
            
            if (!lista.checkItems || lista.checkItems.length === 0) {
              html += `<p style="color: gray; font-size: 12px;">Lista vazia.</p>`;
            } else {
              lista.checkItems.forEach(function(item) {
                html += `
                  <div class="item-box">
                    <strong>${item.name}</strong><br>
                    <div style="margin-top: 8px;">
                      <input type="date" id="${item.id}" style="padding: 5px; border-radius: 3px; border: 1px solid #ccc;">
                      <button class="mod-primary" onclick="salvar('${item.id}')" style="margin-left: 5px;">Salvar Data</button>
                    </div>
                  </div>
                `;
              });
            }
          });

          document.getElementById('conteudo').innerHTML = html;
        }).catch(function(err) {
          document.getElementById('conteudo').innerHTML = '<p style="color:red;">Erro ao ler cartão.</p>';
        });
      });

      // Função de Salvar
      function salvar(id) {
        var data = document.getElementById(id).value;
        if (!data) return alert('Escolha uma data no calendário!');
        
        t.set('card', 'shared', 'data-' + id, data).then(function() {
          alert('Data salva com sucesso! O robô vai lembrar você.');
        });
      }
    </script>
  </body>
</html>
