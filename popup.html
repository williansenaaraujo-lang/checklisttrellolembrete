<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
      body { padding: 15px; font-family: sans-serif; color: #b6c2cf; background-color: #282e33; }
      .item-box { background: #22272b; padding: 10px; border-radius: 5px; margin-bottom: 12px; border: 1px solid #738496; display: flex; flex-direction: column; gap: 8px;}
      h5 { margin-top: 15px; color: #579dff; font-weight: bold; }
      input[type="date"], select { background: #282e33; color: #b6c2cf; border: 1px solid #738496; padding: 6px; border-radius: 3px; outline: none; width: 100%; box-sizing: border-box; }
      .mod-primary { width: 100%; margin-top: 5px; }
      .linha-inputs { display: flex; gap: 5px; }
    </style>
  </head>
  <body>
    <h4 style="color: #fff;">📅 Agendar Lembretes</h4>
    <div id="conteudo">Carregando seus itens...</div>

    <script>
      var t = TrelloPowerUp.iframe();

      t.render(function() {
        // Agora pedimos os checklists E os membros (pessoas) do cartão
        Promise.all([
          t.card('checklists', 'members'),
          t.getAll()
        ]).then(function(valores) {
          var card = valores[0];
          var dadosSalvos = valores[1].card && valores[1].card.shared ? valores[1].card.shared : {};
          var html = '';

          // 1. Prepara a lista de pessoas para o campo de seleção
          var opcoesMembros = '<option value="">Sem responsável</option>';
          if (card.members && card.members.length > 0) {
            card.members.forEach(function(membro) {
              // Salvamos o username (ex: @williansena) para o robô usar depois
              opcoesMembros += `<option value="${membro.username}">${membro.fullName}</option>`;
            });
          } else {
             opcoesMembros = '<option value="">Adicione pessoas ao cartão!</option>';
          }

          if (!card.checklists || card.checklists.length === 0) {
            document.getElementById('conteudo').innerHTML = '<p>Crie um checklist primeiro!</p>';
            return;
          }

          card.checklists.forEach(function(lista) {
            html += `<h5>📋 ${lista.name}</h5>`;
            
            if (!lista.checkItems || lista.checkItems.length === 0) {
              html += `<p style="color: #8c9bab; font-size: 12px;">Lista vazia.</p>`;
            } else {
              lista.checkItems.forEach(function(item) {
                
                var idData = 'data-' + item.id;
                var idResp = 'resp-' + item.id;
                
                var dataAntiga = dadosSalvos[idData] || '';
                var respAntigo = dadosSalvos[idResp] || '';

                // Truque para deixar a pessoa que já estava salva selecionada
                var selectPronto = opcoesMembros.replace(`value="${respAntigo}"`, `value="${respAntigo}" selected`);

                html += `
                  <div class="item-box">
                    <strong style="color: #dfe1e6;">${item.name}</strong>
                    <div class="linha-inputs">
                      <input type="date" id="${idData}" value="${dataAntiga}" title="Data do lembrete">
                      <select id="${idResp}" title="Quem o robô deve cobrar?">
                        ${selectPronto}
                      </select>
                    </div>
                    <button class="mod-primary" onclick="salvar('${item.id}')">Salvar Lembrete</button>
                  </div>
                `;
              });
            }
          });

          document.getElementById('conteudo').innerHTML = html;
        });
      });

      // Função que salva a Data E o Responsável juntos
      window.salvar = function(id) {
        var dataEscolhida = document.getElementById('data-' + id).value;
        var respEscolhido = document.getElementById('resp-' + id).value;
        
        if (!dataEscolhida) return alert('Escolha uma data no calendário!');
        
        // Salva os dois dados de uma vez no cartão
        t.set('card', 'shared', {
          ['data-' + id]: dataEscolhida,
          ['resp-' + id]: respEscolhido
        }).then(function() {
          alert('Pronto! Data e Responsável salvos com sucesso. 🚀');
        });
      }
    </script>
  </body>
</html>
