<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #282e33; color: #b6c2cf; padding: 15px; margin: 0; }
        .chk-title { color: #579dff; border-bottom: 1px solid #353c42; padding-bottom: 5px; margin-top: 15px; font-size: 15px; }
        .item { margin-bottom: 10px; background-color: #22272b; padding: 10px; border-radius: 5px; border: 1px solid #353c42; }
        .item-name { font-weight: bold; margin-bottom: 8px; display: block; font-size: 13px; }
        input, select { width: 100%; padding: 8px; background-color: #282e33; color: #b6c2cf; border: 1px solid #353c42; border-radius: 3px; font-size: 13px; box-sizing: border-box; margin-bottom: 5px; }
        button.salvar { width: 100%; background: #0052CC; color: white; border: none; padding: 12px; border-radius: 3px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        button.recarregar { background: #22272b; border: 1px solid #579dff; color: #579dff; padding: 10px; width: 100%; border-radius: 3px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="content" style="text-align: center; margin-top: 20px;">Carregando sistema...</div>

    <script>
        var t = TrelloPowerUp.iframe();

        function salvarTudo() {
            var dados = {};
            document.querySelectorAll('.item').forEach(function(el) {
                var id = el.getAttribute('data-id');
                var nomeVal = el.getAttribute('data-nome');
                var dataVal = document.getElementById('data-' + id).value;
                var respVal = document.getElementById('resp-' + id).value;

                if (dataVal) {
                    dados['data-' + id] = dataVal;
                    dados['nome-' + id] = nomeVal; 
                    if (respVal) dados['resp-' + id] = respVal;
                }
            });
            var btn = document.getElementById('btnSalvar');
            btn.innerHTML = 'Salvando...';
            // Quando salva, atualiza os cartões antigos para a estrutura nova perfeitamente!
            t.set('card', 'shared', 'dbLembretes', dados).then(function() {
                btn.innerHTML = '✅ Salvo!';
                setTimeout(function() { t.closePopup(); }, 800);
            });
        }

        function desenharInterface() {
            document.getElementById('content').innerHTML = 'Buscando tarefas...';
            Promise.all([ t.card('checklists'), t.get('card', 'shared') ]).then(function(res) {
                var checklists = res[0].checklists || [];
                var shared = res[1] || {};

                // 1. O TRADUTOR: Junta os dados antigos (v1) e os novos (v999) na mesma memória
                var memoria = {};
                for (var k in shared) {
                    if (k.startsWith('data-')) {
                        var id = k.replace('data-', '');
                        if (!memoria[id]) memoria[id] = { id: id, nome: 'Tarefa Antiga', data: '', resp: '' };
                        memoria[id].data = shared[k];
                        memoria[id].resp = shared['resp-' + id] || '';
                    }
                }
                var dbNew = shared.dbLembretes || {};
                for (var k in dbNew) {
                    if (k.startsWith('data-')) {
                        var id = k.replace('data-', '');
                        if (!memoria[id]) memoria[id] = { id: id, nome: 'Tarefa Agendada', data: '', resp: '' };
                        memoria[id].data = dbNew[k];
                        memoria[id].nome = dbNew['nome-' + id] || memoria[id].nome;
                        memoria[id].resp = dbNew['resp-' + id] || memoria[id].resp;
                    }
                }

                // 2. Verifica quem tem itens
                var trelloTemItens = false;
                checklists.forEach(function(c) { if (c.checkItems && c.checkItems.length > 0) trelloTemItens = true; });
                var memoriaTemItens = Object.keys(memoria).length > 0;

                var html = '';

                // Função auxiliar para desenhar o dropdown da equipe
                function buildSelect(id, resp) {
                    var out = '<select id="resp-'+id+'"><option value="">Resp.</option>';
                    var equipe = ["Willian", "Gilberto", "Samira", "Giorgetti", "Rosana", "Eduardo"];
                    equipe.forEach(function(n) {
                        var eqId = n.toLowerCase().replace(/\s/g, '');
                        var sel = (resp === eqId) ? 'selected' : '';
                        out += '<option value="'+eqId+'" '+sel+'>'+n+'</option>';
                    });
                    out += '</select>';
                    return out;
                }

                if (trelloTemItens) {
                    // CENÁRIO A: Trello perfeito (Mostra a lista oficial)
                    var temPendente = false;
                    checklists.forEach(function(lista) {
                        if (lista.checkItems && lista.checkItems.length > 0) {
                            var htmlLista = '<h4 class="chk-title">📋 ' + lista.name + '</h4>';
                            var achou = false;
                            lista.checkItems.forEach(function(item) {
                                if (item.state !== 'complete') {
                                    temPendente = true; achou = true;
                                    var m = memoria[item.id] || { data: '', resp: '' };
                                    var nomeLimpo = item.name.replace(/"/g, '&quot;');
                                    htmlLista += '<div class="item" data-id="'+item.id+'" data-nome="'+nomeLimpo+'">';
                                    htmlLista += '<span class="item-name">'+nomeLimpo+'</span>';
                                    htmlLista += '<div style="display:flex;gap:5px;"><input type="date" id="data-'+item.id+'" value="'+m.data+'">';
                                    htmlLista += buildSelect(item.id, m.resp);
                                    htmlLista += '</div></div>';
                                }
                            });
                            if (achou) html += htmlLista;
                        }
                    });
                    if (temPendente) {
                        html += '<button id="btnSalvar" class="salvar" onclick="salvarTudo()">💾 Salvar Lembretes</button>';
                    } else {
                        html = '<p style="text-align:center;">Todas as tarefas concluídas!</p>';
                    }

                } else if (memoriaTemItens) {
                    // CENÁRIO B: O MILAGRE (Trello bugou no cartão antigo, mas puxamos da memória!)
                    html += '<div style="background-color: #2e3b2e; color: #a3e0a3; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 12px; border: 1px solid #4a754a;">';
                    html += '📡 Trello offline, mas <b>recuperamos seus agendamentos antigos</b> do banco de dados!';
                    html += '</div>';

                    html += '<h4 class="chk-title">💾 Lembretes Antigos Salvos</h4>';
                    for (var id in memoria) {
                        var m = memoria[id];
                        var nomeLimpo = m.nome.replace(/"/g, '&quot;');
                        html += '<div class="item" data-id="'+m.id+'" data-nome="'+nomeLimpo+'">';
                        html += '<span class="item-name">'+nomeLimpo+'</span>';
                        html += '<div style="display:flex;gap:5px;"><input type="date" id="data-'+m.id+'" value="'+m.data+'">';
                        html += buildSelect(m.id, m.resp);
                        html += '</div></div>';
                    }
                    html += '<button id="btnSalvar" class="salvar" onclick="salvarTudo()">💾 Atualizar Cartão Antigo</button>';
                    html += '<button class="recarregar" onclick="desenharInterface()" style="margin-top:10px;">🔄 Tentar Sincronizar com Trello</button>';

                } else {
                    // CENÁRIO C: Cartão realmente novo ou vazio, e Trello lerdo
                    html += '<p style="color:#f5cd47; font-size: 14px; margin-bottom:15px;">O Trello ainda não sincronizou a lista deste cartão.</p>';
                    html += '<button class="recarregar" onclick="desenharInterface()">🔄 Buscar Novamente</button>';
                }

                document.getElementById('content').innerHTML = html;
                t.sizeTo('body');
            });
        }

        t.render(function() { desenharInterface(); });
    </script>
</body>
</html>
