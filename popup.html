<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
      /* Cores perfeitas para o Modo Escuro do Trello */
      body { padding: 15px; font-family: sans-serif; color: #b6c2cf; background-color: #282e33; }
      .item-box { background: #22272b; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #738496; }
      h5 { margin-top: 15px; color: #579dff; font-weight: bold; }
      input[type="date"] { background: #282e33; color: #b6c2cf; border: 1px solid #738496; padding: 5px; border-radius: 3px; outline: none; }
      .mod-primary { margin-left: 5px; }
    </style>
  </head>
  <body>
    <h4 style="color: #fff;">📅 Datas do Checklist</h4>
    <div id="conteudo">Carregando seus itens...</div>

    <script>
      var t = TrelloPowerUp.iframe();

      t.render(function() {
        // Pede os checklists E as datas que já salvamos antes
        Promise.all([
          t.card('checklists'),
          t.getAll() // Puxa os dados escondidos
        ]).then(function(valores) {
          var card = valores[0];
          // Separa só as nossas datas salvas
          var dadosSalvos = valores[1].card && valores[1].card.shared ? valores[1].card.shared : {};
          var html = '';

          if (!card.checklists || card.checklists.length === 0) {
            document.getElementById('conteudo').innerHTML = '<p>Crie um checklist e adicione itens primeiro!</p>';
            return;
          }

          card.checklists.forEach(function(lista) {
            html += `<h5>📋 ${lista.name}</h5>`;
            
            if (!lista.checkItems || lista.checkItems.length === 0) {
              html += `<p style="color: #8c9bab; font-size: 12px;">Lista vazia.</p>`;
            } else {
              lista.checkItems.forEach(function(item) {
                
                // Procura se esse item já tem uma data salva
                var idDoItem = 'data-' + item.id;
                var dataAntiga = dadosSalvos[idDoItem] || '';

                html += `
                  <div class="item-box">
                    <strong style="color: #dfe1e6;">${item.name}</strong><br>
                    <div style="margin-top: 8px;">
                      <input type="date" id="${item.id}" value="${dataAntiga}">
                      <button class="mod-primary" onclick="salvar('${item.id}')">Salvar</button>
                    </div>
                  </div>
                `;
              });
            }
          });

          document.getElementById('conteudo').innerHTML = html;
        });
      });

      // Função de Salvar a data no cartão
      window.salvar = function(id) {
        var data = document.getElementById(id).value;
        if (!data) return alert('Escolha uma data no calendário primeiro!');
        
        t.set('card', 'shared', 'data-' + id, data).then(function() {
          alert('Data salva com sucesso! 🚀');
        });
      }
    </script>
  </body>
</html>
